const PAGES = { home, mission, activities: activitiesPage, founders: foundersPage, contact: contactPage, gallery: galleryPage };

function render() {
  const d = data();
  document.documentElement.lang = state.lang;
  document.querySelector('.t-navMission').textContent = d.navMission;
  document.querySelector('.t-navActivities').textContent = d.navActivities;
  document.querySelector('.t-navFounders').textContent = d.navFounders;
  document.querySelector('.t-navGallery').textContent = d.navGallery;
  document.querySelector('.t-navContact').textContent = d.navContact;
  document.getElementById('lang-btn').textContent = d.langLabel;
  document.getElementById('app').innerHTML = (PAGES[state.page] || home)(d);
}

function goTo(p) { state.page = p; state.formSent = false; window.scrollTo(0, 0); render(); }

document.addEventListener('click', (e) => {
  const goBtn = e.target.closest('[data-go]');
  if (goBtn) { goTo(goBtn.getAttribute('data-go')); return; }
  if (e.target.closest('#lang-btn')) { state.lang = state.lang === 'vi' ? 'en' : 'vi'; render(); }
});

document.addEventListener('submit', (e) => {
  if (e.target.matches('[data-form]')) {
    e.preventDefault();
    state.formSent = true;
    render();
    setTimeout(() => { state.formSent = false; render(); }, 4000);
  }
});

render();
</script>
</body>
</html>
